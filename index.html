<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Global Armed Conflicts & Interactions</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Native ECharts World Map -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/world.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0b0f19; font-family: 'Inter', sans-serif; }
        #map-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Glassmorphism UI */
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: middle; }
        .filter-cb { accent-color: #3b82f6; width: 14px; height: 14px; cursor: pointer; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.3s ease-in-out 0s 2; }

        /* Pure CSS Panel Visibility Controls */
        #info-panel {
            transition: transform 0.3s ease-in-out;
            transform: translateY(120%);
        }
        @media (min-width: 768px) {
            #info-panel {
                transform: translateX(120%);
            }
        }
        #info-panel.open {
            transform: translate(0, 0);
        }
        
        /* Smooth filter collapse */
        #filter-controls-container {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 500px;
            opacity: 1;
            overflow: hidden;
        }
        #filter-controls-container.collapsed {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
        }
    </style>
</head>
<body class="text-slate-200">

    <div id="map-container"></div>

                { from: "Syria", to: "Iraq", theater: "ME", category: "SPILLOVER", type: "Spillover", color: COLORS.SPILLOVER, effect: "dashed", details: "Cross-border armed group movement and regional instability." },
                { from: "China", to: "Taiwan", theater: "ASIA", category: "TENSION", type: "High Escalation Risk", color: COLORS.TENSION, effect: "dotted", details: "Cross-strait confrontation and major-power escalation risk." },
                { from: "China", to: "Philippines", theater: "ASIA", category: "TENSION", type: "Maritime Dispute", color: COLORS.TENSION, effect: "dotted", details: "South China Sea territorial friction." },
                { from: "China", to: "Vietnam", theater: "ASIA", category: "TENSION", type: "Maritime Dispute", color: COLORS.TENSION, effect: "dotted", details: "South China Sea territorial friction." },
                { from: "Armenia", to: "Azerbaijan", theater: "ME", category: "TENSION", type: "Militarized Dispute", color: COLORS.TENSION, effect: "dotted", details: "Persistent military posturing keeping the 'war pathway' open." },
                { from: "India", to: "Pakistan", theater: "ASIA", category: "TENSION", type: "Confrontation", color: COLORS.TENSION, effect: "dotted", details: "Interstate tension context and worsening domestic militancy." }
            ]
        };

        const countryMap = new Map(DATA.countries.map(c => [c.name, c]));

        // ==========================================
        // 2. STATE & URL MANAGEMENT
        // ==========================================
        let myChart;

        let state = {
            theater: 'ALL',
            filters: ['WAR', 'ALLY', 'POLICY', 'SPILLOVER', 'TENSION', 'INTERNAL'],
            selectedNode: null
        };

        const readURL = () => {
            if (!window.location.hash) return;
            // Prevent SecurityError on replaceState with invalid URL formats by cleanly parsing hash
            try {
                // Ensure hash doesn't have an empty invalid format that causes replaceState to throw
                if (window.location.hash === '#' || window.location.hash === '#filters=') {
                   return; 
                }
                const params = new URLSearchParams(window.location.hash.slice(1));
                if (params.has('theater')) state.theater = params.get('theater');
                if (params.has('filters')) {
                    const f = params.get('filters');
                    if (f) state.filters = f.split(',');
                }
                if (params.has('selected')) state.selectedNode = params.get('selected');
            } catch(e) {
                console.warn("Could not parse URL hash", e);
            }
        };

        const updateURL = () => {
            try {
                const params = new URLSearchParams();
                if (state.theater !== 'ALL') params.set('theater', state.theater);
                if (state.filters.length < 6 && state.filters.length > 0) {
                    params.set('filters', state.filters.join(','));
                }
                if (state.selectedNode) params.set('selected', state.selectedNode);
                
                const hash = params.toString();
                // Ensure we don't try to set an invalid empty URL string to prevent the SecurityError
                const newUrl = hash ? `#${hash}` : window.location.pathname;
                
                window.history.replaceState(null, '', newUrl);
            } catch(e) {
                console.warn("Could not update URL history state", e);
            }
        };

        // ==========================================
        // 3. UI RENDERING & LOGIC
        // ==========================================
        
        const datalist = document.getElementById('country-datalist');
        DATA.countries.forEach(c => {
            const option = document.createElement('option');
            option.value = c.name;
            datalist.appendChild(option);
        });

        // Filter Toggle Logic
        const toggleFiltersBtn = document.getElementById('toggle-filters-btn');
        const filterControlsContainer = document.getElementById('filter-controls-container');
        const iconUp = document.getElementById('icon-chevron-up');
        const iconDown = document.getElementById('icon-chevron-down');
        
        // Start minimized on mobile, open on desktop
        let filtersVisible = window.innerWidth > 768;
        if (!filtersVisible) {
            filterControlsContainer.classList.add('collapsed');
            iconUp.classList.add('hidden');
            iconDown.classList.remove('hidden');
        }
        
        toggleFiltersBtn.addEventListener('click', () => {
            filtersVisible = !filtersVisible;
            if (filtersVisible) {
                filterControlsContainer.classList.remove('collapsed');
                iconUp.classList.remove('hidden');
                iconDown.classList.add('hidden');
            } else {
                filterControlsContainer.classList.add('collapsed');
                iconUp.classList.add('hidden');
                iconDown.classList.remove('hidden');
            }
        });

        const syncFilterUI = () => {
            document.querySelectorAll('.filter-cb').forEach(cb => {
                cb.checked = state.filters.includes(cb.value);
            });
            document.getElementById('toggle-all-filters').innerText = state.filters.length === 0 ? "Select All" : "Deselect All";
            
            document.querySelectorAll('.theater-btn').forEach(btn => {
                if (btn.dataset.theater === state.theater) {
                    btn.classList.add('bg-blue-600', 'text-white');
                    btn.classList.remove('bg-slate-800', 'text-slate-300');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('bg-slate-800', 'text-slate-300');
                }
            });
        };

        const updateStatsBar = (visibleNodes) => {
            const counts = { WAR: 0, TENSION: 0, INTERNAL: 0, ALLY: 0, POLICY: 0, SPILLOVER: 0 };
            visibleNodes.forEach(n => counts[n.category]++);
            
            document.getElementById('stats-bar').innerHTML = `
                ${counts.WAR > 0 ? `<span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> ${counts.WAR} Wars</span>` : ''}
                ${counts.INTERNAL > 0 ? `<span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-purple-500"></span> ${counts.INTERNAL} Civil</span>` : ''}
                ${counts.TENSION > 0 ? `<span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-yellow-500"></span> ${counts.TENSION} Tensions</span>` : ''}
                ${counts.ALLY > 0 ? `<span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> ${counts.ALLY} Support</span>` : ''}
                ${counts.POLICY > 0 ? `<span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> ${counts.POLICY} Policy</span>` : ''}
                ${counts.SPILLOVER > 0 ? `<span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span> ${counts.SPILLOVER} Spillover</span>` : ''}
                ${visibleNodes.length === 0 ? '<span>No matches found</span>' : ''}
            `;
        };

        const togglePanel = (show) => {
            const panel = document.getElementById('info-panel');
            if (show) {
                panel.classList.add('open');
                document.getElementById('default-info').classList.add('hidden');
                document.getElementById('dynamic-info').classList.remove('hidden');
            } else {
                panel.classList.remove('open');
            }
        };

        const renderPanel = (countryName, titleOverride = null, typeOverride = null, contextOverride = null, colorOverride = null) => {
            const titleEl = document.getElementById('info-title');
            const badgesEl = document.getElementById('dual-classification-badges');
            const contextEl = document.getElementById('info-context');
            const connectionsContainer = document.getElementById('connections-container');
            const connectionsList = document.getElementById('info-connections');

            if (countryName) {
                const node = countryMap.get(countryName);
                if (!node) return;
                
                titleEl.innerText = node.name;
                contextEl.innerText = node.details;
                badgesEl.innerHTML = `
                    <span class="px-2.5 py-1 rounded-md text-[10px] sm:text-xs font-bold uppercase tracking-wide bg-slate-800 border border-slate-600 text-slate-300">IHL: ${node.ihl}</span>
                    <span class="px-2.5 py-1 rounded-md text-[10px] sm:text-xs font-bold uppercase tracking-wide" style="background:${node.color}30; color:${node.color}; border: 1px solid ${node.color}">Policy: ${node.exposure}</span>
                `;

                const edges = DATA.edges.filter(e => e.from === node.name || e.to === node.name);
                if (edges.length > 0) {
                    connectionsContainer.classList.remove('hidden');
                    connectionsList.innerHTML = edges.map(e => {
                        const other = e.from === node.name ? e.to : e.from;
                        const dir = e.from === node.name ? '→ To' : '← From';
                        return `
                            <li class="flex items-start gap-2 bg-slate-800/40 p-2.5 rounded border border-slate-700/50 hover:bg-slate-700/50 transition-colors cursor-pointer" onclick="selectCountry('${other}')">
                                <span class="w-2.5 h-2.5 rounded-full mt-1 shrink-0" style="background:${e.color}; box-shadow: 0 0 5px ${e.color}"></span>
                                <div>
                                    <span class="font-semibold text-slate-200">${other}</span> 
                                    <span class="text-[10px] uppercase font-bold text-slate-400 ml-1 bg-slate-700/50 px-1 rounded">${dir}</span>
                                    <div class="text-xs mt-0.5 font-medium" style="color:${e.color}">${e.type}</div>
                                </div>
                            </li>`;
                    }).join('');
                } else {
                    connectionsContainer.classList.add('hidden');
                }
            } else {
                titleEl.innerText = titleOverride;
                contextEl.innerText = contextOverride;
                badgesEl.innerHTML = `<span class="px-2.5 py-1 rounded-md text-xs font-bold uppercase tracking-wide" style="background:${colorOverride}30; color:${colorOverride}; border: 1px solid ${colorOverride}">${typeOverride}</span>`;
                connectionsContainer.classList.add('hidden');
            }
            togglePanel(true);
        };

        window.selectCountry = (name) => {
            const node = countryMap.get(name);
            if (!node) return;

            if (state.theater !== 'ALL' && !node.theaters.includes(state.theater)) {
                state.theater = 'ALL';
            }
            
            state.selectedNode = name;
            myChart.setOption({ geo: { center: node.coords, zoom: 4 } });
            
            syncFilterUI();
            updateMapData(); 
            renderPanel(name);
            updateURL();
        };

        // ==========================================
        // 4. MAP RENDERING (UX Spotlight Mode)
        // ==========================================

        const updateMapData = () => {
            if (!myChart) return;

            let connectedNodes = new Set();
            let connectedEdges = new Set();
            
            if (state.selectedNode) {
                connectedNodes.add(state.selectedNode);
                DATA.edges.forEach(e => {
                    if (e.from === state.selectedNode) { connectedNodes.add(e.to); connectedEdges.add(e); }
                    if (e.to === state.selectedNode) { connectedNodes.add(e.from); connectedEdges.add(e); }
                });
            }

            // 1. Points (Nodes) - Fixed Sizes for performance and anti-desync
            const mapNodes = DATA.countries.filter(c => {
                const matchesCat = state.filters.includes(c.category);
                const matchesTheater = state.theater === 'ALL' || c.theaters.includes(state.theater);
                return matchesCat && matchesTheater;
            }).map(c => {
                const isSelected = state.selectedNode === c.name;
                const isConnected = connectedNodes.has(c.name);
                // Dim unselected/unconnected nodes slightly in Spotlight mode
                const opacity = state.selectedNode ? (isConnected ? 1 : 0.2) : 1;
                const size = (c.intensity * 2) + 3; // 5 to 13px
                
                return {
                    name: c.name,
                    value: c.coords.concat([size]), 
                    itemStyle: { 
                        color: c.color, 
                        opacity: opacity,
                        borderColor: isSelected ? '#ffffff' : c.color,
                        borderWidth: isSelected ? 2 : 1,
                        shadowBlur: isConnected ? 10 : 0, 
                        shadowColor: c.color 
                    },
                    category: c.category,
                    status: c.exposure, ihl: c.ihl, details: c.details
                };
            });

            updateStatsBar(mapNodes);

            // Only the selected node gets the noisy ripple effect. Everything else is a clean dot.
            const focusNodes = mapNodes.filter(n => n.name === state.selectedNode);
            const ambientNodes = mapNodes.filter(n => n.name !== state.selectedNode);

            // 2. Connections (Edges) - Spotlight Logic
            const mapLines = DATA.edges.filter(e => {
                const matchesCat = state.filters.includes(e.category);
                const matchesTheater = state.theater === 'ALL' || e.theater === state.theater;
                const fromValid = mapNodes.some(n => n.name === e.from);
                const toValid = mapNodes.some(n => n.name === e.to);
                return matchesCat && matchesTheater && fromValid && toValid;
            }).map((e, idx) => {
                const isConnected = state.selectedNode ? connectedEdges.has(e) : false;
                
                // UX Fix: The "Spaghetti" issue.
                // If nothing is selected, lines are VERY faint (0.15).
                // If a node is selected, its lines are BRIGHT (0.85), everything else is HIDDEN (0.02).
                const opacity = state.selectedNode ? (isConnected ? 0.85 : 0.02) : 0.15;
                const lineWidth = isConnected ? 2.5 : 1;
                
                // Variable curvature to prevent exact stacking
                const baseCurve = 0.2 + (idx % 3) * 0.1;
                const curveness = e.from < e.to ? baseCurve : -baseCurve;

                return {
                    coords: [countryMap.get(e.from).coords, countryMap.get(e.to).coords],
                    fromName: e.from, toName: e.to,
                    type: e.type, details: e.details, color: e.color,
                    isConnected: isConnected,
                    lineStyle: {
                        color: e.color,
                        width: lineWidth,
                        type: e.effect,
                        curveness: curveness,
                        opacity: opacity
                    }
                };
            });

            // 3. Country Area Fills (Polygons)
            let mapFills = [];
            if(mapNodes && mapNodes.length > 0){
               mapFills = mapNodes.map(c => ({
                    name: countryMap.get(c.name).geoName,
                    itemStyle: { 
                        areaColor: countryMap.get(c.name).color + (state.selectedNode && !connectedNodes.has(c.name) ? '05' : '30'),
                        borderColor: countryMap.get(c.name).color + (state.selectedNode && !connectedNodes.has(c.name) ? '10' : 'ff')
                    }
                }));
            }

            // Main UI rebuild. Removed georoam entirely.
            myChart.setOption({
                geo: { id: 'baseGeo', regions: mapFills },
                series: [
                    {
                        id: 'focusNode', name: 'focusNode', type: 'effectScatter', coordinateSystem: 'geo', geoIndex: 0, zlevel: 3,
                        rippleEffect: { brushType: 'stroke', scale: 3 },
                        symbolSize: (val) => val[2] * 1.2, 
                        data: focusNodes
                    },
                    {
                        id: 'ambientNodes', name: 'ambientNodes', type: 'scatter', coordinateSystem: 'geo', geoIndex: 0, zlevel: 2,
                        symbolSize: (val) => val[2], 
                        data: ambientNodes
                    },
                    {
                        id: 'linesSeries', name: 'linesSeries', type: 'lines', coordinateSystem: 'geo', geoIndex: 0, zlevel: 1,
                        symbol: ['none', 'arrow'], symbolSize: 6,
                        effect: { 
                            show: true, period: 4, trailLength: 0.1, symbol: 'circle', symbolSize: 3,
                            // Only animate lines that are currently active in Spotlight mode, or all if none selected
                            // To avoid dynamic evaluation in Echarts effect which can be buggy, we just let it run
                        },
                        data: mapLines
                    }
                ]
            });
        };

        // ==========================================
        // 5. INITIALIZATION & EVENTS
        // ==========================================
        const initChart = () => {
            const chartDom = document.getElementById('map-container');
            myChart = echarts.init(chartDom);

            readURL();
            syncFilterUI();

            let initialCenter = [10, 30];
            let initialZoom = 1.2;
            if (state.theater !== 'ALL') {
                const btn = document.querySelector(`.theater-btn[data-theater="${state.theater}"]`);
                if (btn) {
                    initialCenter = JSON.parse(btn.dataset.center);
                    initialZoom = parseFloat(btn.dataset.zoom);
                }
            }
            if (state.selectedNode) {
                const n = countryMap.get(state.selectedNode);
                if(n) { initialCenter = n.coords; initialZoom = 4; }
            }

            myChart.setOption({
                backgroundColor: 'transparent',
                geo: {
                    id: 'baseGeo',
                    map: 'world', roam: true,
                    zoom: initialZoom, center: initialCenter,
                    label: { emphasis: { show: false } },
                    itemStyle: { areaColor: COLORS.MAP_BG, borderColor: COLORS.MAP_BORDER, borderWidth: 1 },
                    emphasis: { itemStyle: { areaColor: '#1e2538' } }
                },
                tooltip: {
                    trigger: 'item', backgroundColor: 'rgba(15, 23, 42, 0.95)',
                    borderColor: 'rgba(255,255,255,0.1)', textStyle: { color: '#fff' },
                    formatter: function (params) {
                        if (params.seriesType === 'effectScatter' || params.seriesType === 'scatter') {
                            return `<div class="font-bold text-base mb-1">${params.data.name}</div>
                                    <div class="text-xs mb-1 text-slate-300"><span class="font-bold text-slate-400">IHL:</span> ${params.data.ihl}</div>
                                    <div class="text-xs px-2 py-0.5 rounded-full inline-block mb-2 mt-1" style="background:${params.data.itemStyle.color}40; color:${params.data.itemStyle.color}; border: 1px solid ${params.data.itemStyle.color}">${params.data.status}</div>
                                    <div class="text-sm max-w-[250px] whitespace-normal text-slate-200">${params.data.details}</div>`;
                        } else if (params.seriesType === 'lines') {
                            return `<div class="font-bold mb-1">${params.data.fromName} &rarr; ${params.data.toName}</div>
                                    <div class="text-xs mb-1 font-semibold" style="color:${params.data.color}">${params.data.type}</div>
                                    <div class="text-sm max-w-[250px] whitespace-normal text-slate-200">${params.data.details}</div>`;
                        }
                    }
                }
            });

            updateMapData();
            if(state.selectedNode) renderPanel(state.selectedNode);

            // Interaction Clicks
            myChart.on('click', function (params) {
                if (params.seriesType === 'effectScatter' || params.seriesType === 'scatter') {
                    state.selectedNode = params.data.name;
                    updateMapData(); 
                    renderPanel(params.data.name);
                    updateURL();
                } else if (params.seriesType === 'lines') {
                    state.selectedNode = null; 
                    updateMapData();
                    renderPanel(null, `${params.data.fromName} &rarr; ${params.data.toName}`, params.data.type, params.data.details, params.data.color);
                    updateURL();
                }
            });

            // Click empty map to reset
            myChart.getZr().on('click', function(e) {
                if (!e.target) {
                    state.selectedNode = null;
                    updateMapData();
                    togglePanel(false);
                    updateURL();
                }
            });

            window.addEventListener('resize', () => myChart.resize());

            // Filters Checkboxes
            document.querySelectorAll('.filter-cb').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    if (e.target.checked) state.filters.push(e.target.value);
                    else state.filters = state.filters.filter(f => f !== e.target.value);
                    updateMapData();
                    updateURL();
                    document.getElementById('toggle-all-filters').innerText = state.filters.length === 0 ? "Select All" : "Deselect All";
                });
            });

            document.getElementById('toggle-all-filters').addEventListener('click', () => {
                if (state.filters.length > 0) {
                    state.filters = [];
                } else {
                    state.filters = ['WAR', 'ALLY', 'POLICY', 'SPILLOVER', 'TENSION', 'INTERNAL'];
                }
                syncFilterUI();
                updateMapData();
                updateURL();
            });

            // Theaters Buttons
            document.querySelectorAll('.theater-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    state.theater = e.target.dataset.theater;
                    const center = JSON.parse(e.target.dataset.center);
                    const zoom = parseFloat(e.target.dataset.zoom);
                    
                    myChart.setOption({ geo: { center: center, zoom: zoom } });
                    state.selectedNode = null; togglePanel(false);
                    
                    syncFilterUI();
                    updateMapData();
                    updateURL();
                });
            });

            // Search
            const searchInput = document.getElementById('country-search');
            searchInput.addEventListener('input', (e) => {
                const val = e.target.value;
                if (!val) return;
                const match = DATA.countries.find(c => c.name.toLowerCase() === val.toLowerCase());
                if (match) {
                    window.selectCountry(match.name);
                    searchInput.value = ''; 
                    searchInput.blur();
                }
            });

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const val = e.target.value;
                    const match = DATA.countries.find(c => c.name.toLowerCase() === val.toLowerCase());
                    if (!match) {
                        searchInput.classList.add('animate-shake', 'border-red-500');
                        setTimeout(() => { searchInput.classList.remove('animate-shake', 'border-red-500'); }, 700);
                    }
                }
            });

            document.getElementById('close-panel').addEventListener('click', () => {
                state.selectedNode = null;
                updateMapData();
                togglePanel(false);
                updateURL();
            });
        };

        window.onload = initChart;

    </script>
</body>
</html>
