<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Global Armed Conflicts & Interactions</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Native ECharts World Map -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/world.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0b0f19; font-family: 'Inter', sans-serif; }
        #map-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Glassmorphism UI */
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: middle; }
        .filter-cb { accent-color: #3b82f6; width: 14px; height: 14px; cursor: pointer; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.3s ease-in-out 0s 2; }

        /* Pure CSS Panel Visibility Controls */
        #info-panel {
            transition: transform 0.3s ease-in-out;
            transform: translateY(120%);
        }
        @media (min-width: 768px) {
            #info-panel {
                transform: translateX(120%);
            }
        }
        #info-panel.open {
            transform: translate(0, 0);
        }
        
        /* Smooth filter collapse */
        #filter-controls-container {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 500px;
            opacity: 1;
            overflow: hidden;
        }
        #filter-controls-container.collapsed {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
        }
    </style>
</head>
<body class="text-slate-200">

    <div id="map-container"></div>

    <!-- UI Overlay: Header & Controls -->
    <div class="absolute top-0 left-0 w-full p-3 md:p-6 z-10 pointer-events-none flex flex-col items-start gap-4">
        
        <div class="glass-panel rounded-xl p-4 md:p-5 pointer-events-auto w-full md:max-w-sm shrink-0 flex flex-col shadow-2xl">
            
            <!-- Header Row -->
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-lg md:text-xl font-bold text-white flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-500 shrink-0"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
                    Global Conflicts
                </h1>
                <div class="flex items-center gap-2">
                    <span id="ui-date" class="text-[10px] sm:text-xs font-semibold bg-slate-800 text-slate-300 px-2 py-1 rounded-md border border-slate-700 whitespace-nowrap">—</span>
                    <span id="ui-events-date" class="text-[10px] sm:text-xs font-semibold bg-slate-800 text-slate-300 px-2 py-1 rounded-md border border-slate-700 whitespace-nowrap">Events: —</span>
                    <!-- Toggle Controls Button -->
                    <button id="toggle-filters-btn" class="p-1.5 bg-slate-800 text-slate-300 hover:text-white rounded border border-slate-600 transition-colors" title="Toggle Filters">
                        <svg id="icon-chevron-up" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
                        <svg id="icon-chevron-down" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="hidden"><path d="m6 9 6 6 6-6"/></svg>
                    </button>
                </div>
            </div>
            
            <!-- Statistics Bar (Always Visible) -->
            <div id="stats-bar" class="flex flex-wrap gap-x-3 gap-y-1 text-[10px] font-medium text-slate-300 bg-slate-900/50 p-2 rounded-lg border border-slate-700/50">
                <!-- Injected via JS -->
            </div>

            <!-- Collapsible Controls Container -->
            <div id="filter-controls-container" class="flex flex-col mt-3">
                <!-- Search -->
                <div class="relative w-full mb-4">
                    <input type="text" id="country-search" list="country-datalist" autocomplete="off" placeholder="Search country or node..." class="w-full bg-slate-900/80 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition-colors">
                    <datalist id="country-datalist"></datalist>
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute right-3 top-3 text-slate-500"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </div>

                <!-- Theaters Filter Buttons -->
                <div class="mb-4">
                    <h4 class="text-[10px] uppercase tracking-wider text-slate-500 mb-2 font-bold">Zoom To Theater</h4>
                    <div class="flex flex-wrap gap-1.5">
                        <button class="theater-btn active-theater px-2.5 py-1 bg-blue-600 text-white hover:bg-slate-700 text-xs rounded border border-slate-700 transition-colors" data-theater="ALL" data-center="[10, 30]" data-zoom="1.2">Global</button>
                        <button class="theater-btn px-2.5 py-1 bg-slate-800 text-slate-300 hover:bg-slate-700 text-xs rounded border border-slate-700 transition-colors" data-theater="ME" data-center="[42, 32]" data-zoom="4.5">Middle East</button>
                        <button class="theater-btn px-2.5 py-1 bg-slate-800 text-slate-300 hover:bg-slate-700 text-xs rounded border border-slate-700 transition-colors" data-theater="UKR" data-center="[20, 50]" data-zoom="3.5">Europe</button>
                        <button class="theater-btn px-2.5 py-1 bg-slate-800 text-slate-300 hover:bg-slate-700 text-xs rounded border border-slate-700 transition-colors" data-theater="ASIA" data-center="[115, 15]" data-zoom="2.5">Asia-Pacific</button>
                        <button class="theater-btn px-2.5 py-1 bg-slate-800 text-slate-300 hover:bg-slate-700 text-xs rounded border border-slate-700 transition-colors" data-theater="AFR" data-center="[20, 5]" data-zoom="2.2">Africa</button>
                    </div>
                </div>

                <!-- Interaction Filters -->
                <div>
                    <div class="flex justify-between items-center mt-1 border-t border-slate-700 pt-3 mb-2">
                        <h4 class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">Filter Interactions</h4>
                        <button id="toggle-all-filters" class="text-[10px] text-blue-400 hover:text-blue-300 uppercase tracking-wide font-semibold">Deselect All</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-xs">
                        <label class="flex items-center gap-2 text-slate-300 hover:text-white transition-colors"><input type="checkbox" class="filter-cb" value="WAR" checked> <span class="legend-dot" style="background:#ef4444"></span> Active War</label>
                        <label class="flex items-center gap-2 text-slate-300 hover:text-white transition-colors"><input type="checkbox" class="filter-cb" value="ALLY" checked> <span class="legend-dot" style="background:#0ea5e9"></span> Military Support</label>
                        <label class="flex items-center gap-2 text-slate-300 hover:text-white transition-colors"><input type="checkbox" class="filter-cb" value="POLICY" checked> <span class="legend-dot" style="background:#10b981"></span> Policy / Sanctions</label>
                        <label class="flex items-center gap-2 text-slate-300 hover:text-white transition-colors"><input type="checkbox" class="filter-cb" value="SPILLOVER" checked> <span class="legend-dot" style="background:#f97316"></span> Spillover / Basing</label>
                        <label class="flex items-center gap-2 text-slate-300 hover:text-white transition-colors"><input type="checkbox" class="filter-cb" value="TENSION" checked> <span class="legend-dot" style="background:#eab308"></span> High Escalation</label>
                        <label class="flex items-center gap-2 text-slate-300 hover:text-white transition-colors"><input type="checkbox" class="filter-cb" value="INTERNAL" checked> <span class="legend-dot" style="background:#a855f7"></span> Civil Conflict</label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- UI Overlay: Information Panel -->
    <div id="info-panel" class="fixed inset-x-0 bottom-0 md:absolute md:inset-auto md:bottom-6 md:right-6 md:w-[400px] max-h-[50vh] md:max-h-[80vh] overflow-y-auto glass-panel rounded-t-2xl md:rounded-xl p-5 md:p-6 z-20 pointer-events-auto shadow-2xl">
        
        <div id="default-info" class="text-center py-6 md:py-10 text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-4 opacity-50"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <p class="text-sm">Select any country or connection line on the map to view details, context, and available evidence.</p>
        </div>
        
        <div id="dynamic-info" class="hidden pb-4 md:pb-0">
            <button id="close-panel" class="absolute top-4 right-4 text-slate-400 hover:text-white bg-slate-800 rounded-full p-1 border border-slate-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>

            <h2 id="info-title" class="text-xl md:text-2xl font-bold text-white mb-3 pr-8"></h2>
            
            <div id="dual-classification-badges" class="flex flex-wrap gap-2 mb-4"></div>
            
            <div class="space-y-4">
                <div>
                    <h4 class="text-[10px] uppercase tracking-wider text-slate-400 mb-1.5 font-bold">Details & Context</h4>
                    <p id="info-context" class="text-sm leading-relaxed text-slate-200 bg-slate-800/50 p-3 rounded-lg border border-slate-700/50 shadow-inner"></p>
                </div>
                
                <div id="connections-container" class="hidden">
                    <h4 class="text-[10px] uppercase tracking-wider text-slate-400 mb-2 font-bold">Network Connections</h4>
                    <ul id="info-connections" class="space-y-2 text-sm"></ul>
                </div>

                <div id="events-container" class="hidden">
                   <h4 class="text-[10px] uppercase tracking-wider text-slate-400 mb-2 font-bold">Recent Events</h4>
                    <ul id="info-events" class="space-y-2 text-sm"></ul>
                </div>
            </div>
        </div>
    </div>

   <script type="module" src="./assets/app.js"></script>
    
</body>
</html>
